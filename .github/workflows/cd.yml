name: Deploy Tagged Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      APP_DIR: ${{ vars.APP_DIR || '/opt/auth' }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'auth' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'auth' }}
      BOOTSTRAP_ADMIN_ENABLED: ${{ vars.BOOTSTRAP_ADMIN_ENABLED || 'true' }}
      APP_CORS_ALLOWED_ORIGINS: ${{ vars.APP_CORS_ALLOWED_ORIGINS || 'https://aandiclub.com,https://admin.aandiclub.com,https://auth.aandiclub.com,https://api.aandiclub.com' }}
      APP_PROFILE_ALLOWED_IMAGE_HOSTS: ${{ vars.APP_PROFILE_ALLOWED_IMAGE_HOSTS || '' }}
      APP_PROFILE_IMAGE_ENABLED: ${{ vars.APP_PROFILE_IMAGE_ENABLED || 'false' }}
      APP_PROFILE_IMAGE_BUCKET: ${{ vars.APP_PROFILE_IMAGE_BUCKET || '' }}
      APP_PROFILE_IMAGE_REGION: ${{ vars.APP_PROFILE_IMAGE_REGION || 'ap-northeast-2' }}
      APP_PROFILE_IMAGE_KEY_PREFIX: ${{ vars.APP_PROFILE_IMAGE_KEY_PREFIX || 'profiles' }}
      APP_PROFILE_IMAGE_PUBLIC_BASE_URL: ${{ vars.APP_PROFILE_IMAGE_PUBLIC_BASE_URL || '' }}
      APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS: ${{ vars.APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS || '600' }}
      APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES: ${{ vars.APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES || '5242880' }}
      APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES: ${{ vars.APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES || 'image/jpeg,image/png,image/webp' }}
      APP_USER_PROFILE_EVENT_ENABLED: ${{ vars.APP_USER_PROFILE_EVENT_ENABLED || 'false' }}
      APP_USER_PROFILE_EVENT_TOPIC_ARN: ${{ secrets.APP_USER_PROFILE_EVENT_TOPIC_ARN }}
      APP_USER_PROFILE_EVENT_REGION: ${{ vars.APP_USER_PROFILE_EVENT_REGION || 'ap-northeast-2' }}
      APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID: ${{ vars.APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID || 'user-profile-updated' }}
      APP_INVITE_ACTIVATION_BASE_URL: ${{ vars.APP_INVITE_ACTIVATION_BASE_URL || 'https://aandiclub.com/activate' }}
      APP_INVITE_EXPIRATION_HOURS: ${{ vars.APP_INVITE_EXPIRATION_HOURS || '72' }}
      APP_INVITE_MAIL_SUBJECT: ${{ vars.APP_INVITE_MAIL_SUBJECT || 'A&I 개발동아리 신규 동아리원 초대 안내' }}
      APP_INVITE_MAIL_FROM_NAME: ${{ vars.APP_INVITE_MAIL_FROM_NAME || 'A&I 개발동아리 운영진' }}
      APP_INVITE_MAIL_FROM: ${{ vars.APP_INVITE_MAIL_FROM || '' }}
      SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
      SMTP_AUTH: ${{ vars.SMTP_AUTH || 'true' }}
      SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS || 'true' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      APP_OPENAPI_SERVER_URL: ${{ vars.APP_OPENAPI_SERVER_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: ${GITHUB_REF_NAME}"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Validate required auth JWT config
        run: |
          [[ -n "${JWT_ISSUER}" ]] || (echo "Missing vars.JWT_ISSUER" && exit 1)
          [[ -n "${JWT_AUDIENCE}" ]] || (echo "Missing vars.JWT_AUDIENCE" && exit 1)
          [[ -n "${JWT_SECRET}" ]] || (echo "Missing secrets.JWT_SECRET" && exit 1)
          if [[ "${APP_PROFILE_IMAGE_ENABLED}" == "true" ]]; then
            [[ -n "${APP_PROFILE_IMAGE_BUCKET}" ]] || (echo "Missing vars.APP_PROFILE_IMAGE_BUCKET" && exit 1)
            [[ -n "${APP_PROFILE_ALLOWED_IMAGE_HOSTS}" ]] || (echo "Missing vars.APP_PROFILE_ALLOWED_IMAGE_HOSTS" && exit 1)
          fi
          if [[ "${APP_USER_PROFILE_EVENT_ENABLED}" == "true" ]]; then
            [[ -n "${APP_USER_PROFILE_EVENT_TOPIC_ARN}" ]] || (echo "Missing secrets.APP_USER_PROFILE_EVENT_TOPIC_ARN" && exit 1)
          fi
          if [[ "${BOOTSTRAP_ADMIN_ENABLED}" == "true" ]]; then
            [[ -n "${BOOTSTRAP_ADMIN_PASSWORD}" ]] || (echo "Missing secrets.BOOTSTRAP_ADMIN_PASSWORD" && exit 1)
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Deploy on instance via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          APP_DIR: ${{ env.APP_DIR }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          BOOTSTRAP_ADMIN_ENABLED: ${{ env.BOOTSTRAP_ADMIN_ENABLED }}
          APP_CORS_ALLOWED_ORIGINS: ${{ env.APP_CORS_ALLOWED_ORIGINS }}
          APP_PROFILE_ALLOWED_IMAGE_HOSTS: ${{ env.APP_PROFILE_ALLOWED_IMAGE_HOSTS }}
          APP_PROFILE_IMAGE_ENABLED: ${{ env.APP_PROFILE_IMAGE_ENABLED }}
          APP_PROFILE_IMAGE_BUCKET: ${{ env.APP_PROFILE_IMAGE_BUCKET }}
          APP_PROFILE_IMAGE_REGION: ${{ env.APP_PROFILE_IMAGE_REGION }}
          APP_PROFILE_IMAGE_KEY_PREFIX: ${{ env.APP_PROFILE_IMAGE_KEY_PREFIX }}
          APP_PROFILE_IMAGE_PUBLIC_BASE_URL: ${{ env.APP_PROFILE_IMAGE_PUBLIC_BASE_URL }}
          APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS: ${{ env.APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS }}
          APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES: ${{ env.APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES }}
          APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES: ${{ env.APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES }}
          APP_USER_PROFILE_EVENT_ENABLED: ${{ env.APP_USER_PROFILE_EVENT_ENABLED }}
          APP_USER_PROFILE_EVENT_TOPIC_ARN: ${{ env.APP_USER_PROFILE_EVENT_TOPIC_ARN }}
          APP_USER_PROFILE_EVENT_REGION: ${{ env.APP_USER_PROFILE_EVENT_REGION }}
          APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID: ${{ env.APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID }}
          APP_INVITE_ACTIVATION_BASE_URL: ${{ env.APP_INVITE_ACTIVATION_BASE_URL }}
          APP_INVITE_EXPIRATION_HOURS: ${{ env.APP_INVITE_EXPIRATION_HOURS }}
          APP_INVITE_MAIL_SUBJECT: ${{ env.APP_INVITE_MAIL_SUBJECT }}
          APP_INVITE_MAIL_FROM_NAME: ${{ env.APP_INVITE_MAIL_FROM_NAME }}
          APP_INVITE_MAIL_FROM: ${{ env.APP_INVITE_MAIL_FROM }}
          SMTP_HOST: ${{ env.SMTP_HOST }}
          SMTP_PORT: ${{ env.SMTP_PORT }}
          SMTP_AUTH: ${{ env.SMTP_AUTH }}
          SMTP_STARTTLS: ${{ env.SMTP_STARTTLS }}
          SMTP_USERNAME: ${{ env.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ env.SMTP_PASSWORD }}
          JWT_ISSUER: ${{ env.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ env.JWT_AUDIENCE }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ env.BOOTSTRAP_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          APP_OPENAPI_SERVER_URL: ${{ env.APP_OPENAPI_SERVER_URL }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: ${{ vars.AWS_PORT || '22' }}
          envs: AWS_REGION,IMAGE_URI,APP_DIR,POSTGRES_DB,POSTGRES_USER,BOOTSTRAP_ADMIN_ENABLED,APP_CORS_ALLOWED_ORIGINS,APP_PROFILE_ALLOWED_IMAGE_HOSTS,APP_PROFILE_IMAGE_ENABLED,APP_PROFILE_IMAGE_BUCKET,APP_PROFILE_IMAGE_REGION,APP_PROFILE_IMAGE_KEY_PREFIX,APP_PROFILE_IMAGE_PUBLIC_BASE_URL,APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS,APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES,APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES,APP_USER_PROFILE_EVENT_ENABLED,APP_USER_PROFILE_EVENT_TOPIC_ARN,APP_USER_PROFILE_EVENT_REGION,APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID,APP_INVITE_ACTIVATION_BASE_URL,APP_INVITE_EXPIRATION_HOURS,APP_INVITE_MAIL_SUBJECT,APP_INVITE_MAIL_FROM_NAME,APP_INVITE_MAIL_FROM,SMTP_HOST,SMTP_PORT,SMTP_AUTH,SMTP_STARTTLS,SMTP_USERNAME,SMTP_PASSWORD,JWT_ISSUER,JWT_AUDIENCE,POSTGRES_PASSWORD,REDIS_PASSWORD,BOOTSTRAP_ADMIN_PASSWORD,JWT_SECRET,APP_OPENAPI_SERVER_URL
          script: |
            set -euo pipefail

            ECR_REGISTRY="$(echo "${IMAGE_URI}" | cut -d'/' -f1)"
            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            mkdir -p "${APP_DIR}"
            cat <<'EOF' > "${APP_DIR}/docker-compose.yml"
            services:
              postgres:
                image: postgres:16-alpine
                container_name: auth-postgres
                restart: always
                environment:
                  POSTGRES_DB: ${POSTGRES_DB}
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              redis:
                image: redis:7-alpine
                container_name: auth-redis
                restart: always
                command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
                healthcheck:
                  test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              auth:
                image: ${IMAGE_URI}
                container_name: auth
                restart: always
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                ports:
                  - "8080:8080"
                environment:
                  SPRING_PROFILES_ACTIVE: prod
                  DB_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB}
                  DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
                  DB_MIGRATION_ENABLED: "true"
                  DB_USERNAME: ${POSTGRES_USER}
                  DB_PASSWORD: ${POSTGRES_PASSWORD}
                  REDIS_HOST: redis
                  REDIS_PORT: 6379
                  REDIS_PASSWORD: ${REDIS_PASSWORD}
                  BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED}
                  BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
                  APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
                  APP_PROFILE_ALLOWED_IMAGE_HOSTS: ${APP_PROFILE_ALLOWED_IMAGE_HOSTS}
                  APP_PROFILE_IMAGE_ENABLED: ${APP_PROFILE_IMAGE_ENABLED}
                  APP_PROFILE_IMAGE_BUCKET: ${APP_PROFILE_IMAGE_BUCKET}
                  APP_PROFILE_IMAGE_REGION: ${APP_PROFILE_IMAGE_REGION}
                  APP_PROFILE_IMAGE_KEY_PREFIX: ${APP_PROFILE_IMAGE_KEY_PREFIX}
                  APP_PROFILE_IMAGE_PUBLIC_BASE_URL: ${APP_PROFILE_IMAGE_PUBLIC_BASE_URL}
                  APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS: ${APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS}
                  APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES: ${APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES}
                  APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES: ${APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES}
                  APP_USER_PROFILE_EVENT_ENABLED: ${APP_USER_PROFILE_EVENT_ENABLED}
                  APP_USER_PROFILE_EVENT_TOPIC_ARN: ${APP_USER_PROFILE_EVENT_TOPIC_ARN}
                  APP_USER_PROFILE_EVENT_REGION: ${APP_USER_PROFILE_EVENT_REGION}
                  APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID: ${APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID}
                  APP_INVITE_ACTIVATION_BASE_URL: ${APP_INVITE_ACTIVATION_BASE_URL}
                  APP_INVITE_EXPIRATION_HOURS: ${APP_INVITE_EXPIRATION_HOURS}
                  APP_INVITE_MAIL_SUBJECT: ${APP_INVITE_MAIL_SUBJECT}
                  APP_INVITE_MAIL_FROM_NAME: ${APP_INVITE_MAIL_FROM_NAME}
                  APP_INVITE_MAIL_FROM: ${APP_INVITE_MAIL_FROM}
                  SMTP_HOST: ${SMTP_HOST}
                  SMTP_PORT: ${SMTP_PORT}
                  SMTP_AUTH: ${SMTP_AUTH}
                  SMTP_STARTTLS: ${SMTP_STARTTLS}
                  SMTP_USERNAME: ${SMTP_USERNAME}
                  SMTP_PASSWORD: ${SMTP_PASSWORD}
                  JWT_ISSUER: ${JWT_ISSUER}
                  JWT_AUDIENCE: ${JWT_AUDIENCE}
                  JWT_SECRET: ${JWT_SECRET}
                  APP_OPENAPI_SERVER_URL: ${APP_OPENAPI_SERVER_URL}

            volumes:
              postgres_data:
            EOF

            cd "${APP_DIR}"
            IMAGE_URI="${IMAGE_URI}" \
            POSTGRES_DB="${POSTGRES_DB}" \
            POSTGRES_USER="${POSTGRES_USER}" \
            BOOTSTRAP_ADMIN_ENABLED="${BOOTSTRAP_ADMIN_ENABLED}" \
            APP_CORS_ALLOWED_ORIGINS="${APP_CORS_ALLOWED_ORIGINS}" \
            APP_PROFILE_ALLOWED_IMAGE_HOSTS="${APP_PROFILE_ALLOWED_IMAGE_HOSTS}" \
            APP_PROFILE_IMAGE_ENABLED="${APP_PROFILE_IMAGE_ENABLED}" \
            APP_PROFILE_IMAGE_BUCKET="${APP_PROFILE_IMAGE_BUCKET}" \
            APP_PROFILE_IMAGE_REGION="${APP_PROFILE_IMAGE_REGION}" \
            APP_PROFILE_IMAGE_KEY_PREFIX="${APP_PROFILE_IMAGE_KEY_PREFIX}" \
            APP_PROFILE_IMAGE_PUBLIC_BASE_URL="${APP_PROFILE_IMAGE_PUBLIC_BASE_URL}" \
            APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS="${APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS}" \
            APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES="${APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES}" \
            APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES="${APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES}" \
            APP_USER_PROFILE_EVENT_ENABLED="${APP_USER_PROFILE_EVENT_ENABLED}" \
            APP_USER_PROFILE_EVENT_TOPIC_ARN="${APP_USER_PROFILE_EVENT_TOPIC_ARN}" \
            APP_USER_PROFILE_EVENT_REGION="${APP_USER_PROFILE_EVENT_REGION}" \
            APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID="${APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID}" \
            APP_INVITE_ACTIVATION_BASE_URL="${APP_INVITE_ACTIVATION_BASE_URL}" \
            APP_INVITE_EXPIRATION_HOURS="${APP_INVITE_EXPIRATION_HOURS}" \
            APP_INVITE_MAIL_SUBJECT="${APP_INVITE_MAIL_SUBJECT}" \
            APP_INVITE_MAIL_FROM_NAME="${APP_INVITE_MAIL_FROM_NAME}" \
            APP_INVITE_MAIL_FROM="${APP_INVITE_MAIL_FROM}" \
            SMTP_HOST="${SMTP_HOST}" \
            SMTP_PORT="${SMTP_PORT}" \
            SMTP_AUTH="${SMTP_AUTH}" \
            SMTP_STARTTLS="${SMTP_STARTTLS}" \
            SMTP_USERNAME="${SMTP_USERNAME}" \
            SMTP_PASSWORD="${SMTP_PASSWORD}" \
            JWT_ISSUER="${JWT_ISSUER}" \
            JWT_AUDIENCE="${JWT_AUDIENCE}" \
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            REDIS_PASSWORD="${REDIS_PASSWORD}" \
            BOOTSTRAP_ADMIN_PASSWORD="${BOOTSTRAP_ADMIN_PASSWORD}" \
            JWT_SECRET="${JWT_SECRET}" \
            APP_OPENAPI_SERVER_URL="${APP_OPENAPI_SERVER_URL}" \
            docker compose pull

            IMAGE_URI="${IMAGE_URI}" \
            POSTGRES_DB="${POSTGRES_DB}" \
            POSTGRES_USER="${POSTGRES_USER}" \
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            REDIS_PASSWORD="${REDIS_PASSWORD}" \
            docker compose up -d postgres redis

            # Guarantee required schema exists before auth startup.
            docker exec -i auth-postgres psql -v ON_ERROR_STOP=1 -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" <<'SQL'
            CREATE TABLE IF NOT EXISTS users (
              id UUID PRIMARY KEY,
              username VARCHAR(64) NOT NULL UNIQUE,
              password_hash VARCHAR(255) NOT NULL,
              role VARCHAR(32) NOT NULL,
              force_password_change BOOLEAN NOT NULL DEFAULT FALSE,
              is_active BOOLEAN NOT NULL DEFAULT TRUE,
              last_login_at TIMESTAMP NULL,
              created_at TIMESTAMP NOT NULL,
              updated_at TIMESTAMP NOT NULL
            );
            ALTER TABLE users
              ADD COLUMN IF NOT EXISTS force_password_change BOOLEAN NOT NULL DEFAULT FALSE,
              ADD COLUMN IF NOT EXISTS is_active BOOLEAN NOT NULL DEFAULT TRUE,
              ADD COLUMN IF NOT EXISTS last_login_at TIMESTAMP NULL,
              ADD COLUMN IF NOT EXISTS nickname VARCHAR(40) NULL,
              ADD COLUMN IF NOT EXISTS profile_image_url VARCHAR(2048) NULL,
              ADD COLUMN IF NOT EXISTS profile_version BIGINT NOT NULL DEFAULT 0,
              ADD COLUMN IF NOT EXISTS user_track VARCHAR(16),
              ADD COLUMN IF NOT EXISTS cohort INTEGER,
              ADD COLUMN IF NOT EXISTS cohort_order INTEGER,
              ADD COLUMN IF NOT EXISTS public_code VARCHAR(16);
            CREATE UNIQUE INDEX IF NOT EXISTS ux_users_username ON users (username);
            UPDATE users
            SET cohort = COALESCE(cohort, 0);
            WITH ranked AS (
              SELECT id, ROW_NUMBER() OVER (PARTITION BY cohort ORDER BY created_at, id) AS rn
              FROM users
            )
            UPDATE users u
            SET cohort_order = COALESCE(u.cohort_order, ranked.rn)
            FROM ranked
            WHERE u.id = ranked.id;
            UPDATE users
            SET user_track = COALESCE(user_track, 'NO');
            UPDATE users
            SET public_code = CONCAT(
              '#',
              CASE
                WHEN role = 'USER' THEN
                  CASE user_track
                    WHEN 'FL' THEN 'FL'
                    WHEN 'SP' THEN 'SP'
                    ELSE 'NO'
                  END
                WHEN role = 'ORGANIZER' THEN 'OR'
                ELSE 'AD'
              END,
              cohort::TEXT,
              LPAD(cohort_order::TEXT, 2, '0')
            )
            WHERE public_code IS NULL;
            ALTER TABLE users
              ALTER COLUMN user_track SET NOT NULL,
              ALTER COLUMN cohort SET NOT NULL,
              ALTER COLUMN cohort_order SET NOT NULL,
              ALTER COLUMN public_code SET NOT NULL;
            CREATE UNIQUE INDEX IF NOT EXISTS ux_users_public_code ON users (public_code);

            CREATE TABLE IF NOT EXISTS user_invites (
              id UUID PRIMARY KEY,
              user_id UUID NOT NULL,
              token_hash VARCHAR(128) NOT NULL UNIQUE,
              expires_at TIMESTAMP NOT NULL,
              used_at TIMESTAMP NULL,
              created_at TIMESTAMP NOT NULL,
              CONSTRAINT fk_user_invites_user_id FOREIGN KEY (user_id) REFERENCES users (id) ON DELETE CASCADE
            );
            CREATE INDEX IF NOT EXISTS ix_user_invites_user_id ON user_invites (user_id);
            CREATE INDEX IF NOT EXISTS ix_user_invites_expires_at ON user_invites (expires_at);
            SQL

            IMAGE_URI="${IMAGE_URI}" \
            POSTGRES_DB="${POSTGRES_DB}" \
            POSTGRES_USER="${POSTGRES_USER}" \
            BOOTSTRAP_ADMIN_ENABLED="${BOOTSTRAP_ADMIN_ENABLED}" \
            APP_CORS_ALLOWED_ORIGINS="${APP_CORS_ALLOWED_ORIGINS}" \
            APP_PROFILE_ALLOWED_IMAGE_HOSTS="${APP_PROFILE_ALLOWED_IMAGE_HOSTS}" \
            APP_PROFILE_IMAGE_ENABLED="${APP_PROFILE_IMAGE_ENABLED}" \
            APP_PROFILE_IMAGE_BUCKET="${APP_PROFILE_IMAGE_BUCKET}" \
            APP_PROFILE_IMAGE_REGION="${APP_PROFILE_IMAGE_REGION}" \
            APP_PROFILE_IMAGE_KEY_PREFIX="${APP_PROFILE_IMAGE_KEY_PREFIX}" \
            APP_PROFILE_IMAGE_PUBLIC_BASE_URL="${APP_PROFILE_IMAGE_PUBLIC_BASE_URL}" \
            APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS="${APP_PROFILE_IMAGE_UPLOAD_URL_EXPIRATION_SECONDS}" \
            APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES="${APP_PROFILE_IMAGE_MAX_UPLOAD_BYTES}" \
            APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES="${APP_PROFILE_IMAGE_ALLOWED_CONTENT_TYPES}" \
            APP_USER_PROFILE_EVENT_ENABLED="${APP_USER_PROFILE_EVENT_ENABLED}" \
            APP_USER_PROFILE_EVENT_TOPIC_ARN="${APP_USER_PROFILE_EVENT_TOPIC_ARN}" \
            APP_USER_PROFILE_EVENT_REGION="${APP_USER_PROFILE_EVENT_REGION}" \
            APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID="${APP_USER_PROFILE_EVENT_FIFO_MESSAGE_GROUP_ID}" \
            APP_INVITE_ACTIVATION_BASE_URL="${APP_INVITE_ACTIVATION_BASE_URL}" \
            APP_INVITE_EXPIRATION_HOURS="${APP_INVITE_EXPIRATION_HOURS}" \
            APP_INVITE_MAIL_SUBJECT="${APP_INVITE_MAIL_SUBJECT}" \
            APP_INVITE_MAIL_FROM_NAME="${APP_INVITE_MAIL_FROM_NAME}" \
            APP_INVITE_MAIL_FROM="${APP_INVITE_MAIL_FROM}" \
            SMTP_HOST="${SMTP_HOST}" \
            SMTP_PORT="${SMTP_PORT}" \
            SMTP_AUTH="${SMTP_AUTH}" \
            SMTP_STARTTLS="${SMTP_STARTTLS}" \
            SMTP_USERNAME="${SMTP_USERNAME}" \
            SMTP_PASSWORD="${SMTP_PASSWORD}" \
            JWT_ISSUER="${JWT_ISSUER}" \
            JWT_AUDIENCE="${JWT_AUDIENCE}" \
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            REDIS_PASSWORD="${REDIS_PASSWORD}" \
            BOOTSTRAP_ADMIN_PASSWORD="${BOOTSTRAP_ADMIN_PASSWORD}" \
            JWT_SECRET="${JWT_SECRET}" \
            APP_OPENAPI_SERVER_URL="${APP_OPENAPI_SERVER_URL}" \
            docker compose up -d --remove-orphans

            docker image prune -f --filter "until=72h"
